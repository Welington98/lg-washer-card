name: Validate

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validar HACS
        uses: hacs/action@main
        with:
          category: plugin
